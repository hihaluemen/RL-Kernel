<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">linear_logp single-operator reserved memory</title>
  <desc id="desc">Horizontal bar chart comparing vime and vime + RL-Kernel single-operator peak reserved delta for T1, T2, and T3.</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .panel { fill: #ffffff; stroke: #d6deea; stroke-width: 1.5; }
      .grid { stroke: #e0e6ef; stroke-width: 1; }
      .axis { stroke: #9aa8ba; stroke-width: 1.2; }
      .title { font: 800 30px Inter, Arial, sans-serif; fill: #0f1f33; }
      .subtitle { font: 400 16px Inter, Arial, sans-serif; fill: #5d6b7f; }
      .label { font: 700 16px Inter, Arial, sans-serif; fill: #17243a; }
      .small { font: 400 13px Inter, Arial, sans-serif; fill: #536277; }
      .value { font: 700 14px Inter, Arial, sans-serif; fill: #13233a; }
      .save { font: 800 17px Inter, Arial, sans-serif; fill: #0f766e; }
      .vime { fill: #eda84f; }
      .vime-rlk { fill: #3478f6; }
      .legend-text { font: 600 14px Inter, Arial, sans-serif; fill: #243246; }
      .callout { fill: #e6f7ee; stroke: #8ad9aa; stroke-width: 1.2; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="640"/>
  <text class="title" x="58" y="58">Single-operator reserved memory drops with vime + RL-Kernel</text>
  <text class="subtitle" x="58" y="86">linear_logp peak_reserved_delta, no-trace stable windows, Qwen3-30B-A3B on 8xH100.</text>

  <rect x="816" y="88" width="18" height="18" rx="4" class="vime"/>
  <text class="legend-text" x="842" y="103">vime</text>
  <rect x="902" y="88" width="18" height="18" rx="4" class="vime-rlk"/>
  <text class="legend-text" x="928" y="103">vime + RL-Kernel</text>

  <rect class="panel" x="58" y="122" width="1084" height="420" rx="8"/>

  <line class="axis" x1="300" y1="460" x2="1040" y2="460"/>
  <line class="grid" x1="300" y1="160" x2="300" y2="460"/>
  <line class="grid" x1="518" y1="160" x2="518" y2="460"/>
  <line class="grid" x1="735" y1="160" x2="735" y2="460"/>
  <line class="grid" x1="953" y1="160" x2="953" y2="460"/>
  <text class="small" x="288" y="486">0 MB</text>
  <text class="small" x="496" y="486">10000</text>
  <text class="small" x="713" y="486">20000</text>
  <text class="small" x="931" y="486">30000</text>

  <text class="label" x="120" y="208">T1</text>
  <rect class="vime" x="300" y="178" width="88" height="28" rx="6"/>
  <rect class="vime-rlk" x="300" y="218" width="68" height="28" rx="6"/>
  <text class="value" x="400" y="198">4056 MB</text>
  <text class="value" x="380" y="238">3112 MB</text>
  <text class="save" x="820" y="218">944 MB lower</text>

  <text class="label" x="120" y="310">T2</text>
  <rect class="vime" x="300" y="280" width="146" height="28" rx="6"/>
  <rect class="vime-rlk" x="300" y="320" width="106" height="28" rx="6"/>
  <text class="value" x="458" y="300">6684 MB</text>
  <text class="value" x="418" y="340">4862 MB</text>
  <text class="save" x="820" y="320">1822 MB lower</text>

  <text class="label" x="120" y="412">T3</text>
  <rect class="vime" x="300" y="382" width="704" height="28" rx="6"/>
  <rect class="vime-rlk" x="300" y="422" width="582" height="28" rx="6"/>
  <text class="value" x="1014" y="402">32342 MB</text>
  <text class="value" x="894" y="442">26710 MB</text>
  <rect class="callout" x="760" y="468" width="330" height="44" rx="8"/>
  <text class="save" x="925" y="496" text-anchor="middle">5632 MB lower at T3</text>

  <text class="small" x="58" y="602">Scope: single linear_logp operator memory probe.</text>
</svg>
